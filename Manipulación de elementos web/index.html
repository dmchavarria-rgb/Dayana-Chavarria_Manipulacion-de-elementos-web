<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio DOM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <main class="container py-5">
    <section class="card shadow-sm">
      <div class="card-body">

        <h1 class="h4 mb-3">Registro de estudiantes</h1>
        <p class="text-muted">
          Ingrese los datos del estudiante y agréguelo dinámicamente a la tabla.
        </p>

        <div class="row g-3">
          <div class="col-md-4">
            <label for="nombre" class="form-label">Nombre</label>
            <input id="nombre" type="text" class="form-control" placeholder="Ejemplo: Ana Torres">
          </div>

          <div class="col-md-4">
            <label for="carrera" class="form-label">Carrera</label>
            <select id="carrera" class="form-select">
              <option value="">Seleccione...</option>
              <option value="Tecnologías de la Información">Tecnologías de la Información</option>
              <option value="Software">Software</option>
              <option value="Sistemas">Sistemas</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="semestre" class="form-label">Semestre</label>
            <input id="semestre" type="number" class="form-control" min="1" max="10">
          </div>
        </div>

        <div class="mt-4">
          <button id="btnAgregar" class="btn btn-primary">Agregar estudiante</button>
          <button id="btnLimpiar" class="btn btn-outline-secondary">Limpiar tabla</button>
        </div>

        <p class="mt-3">
          Total de estudiantes registrados: <strong id="totalEstudiantes">0</strong>
        </p>

        <table class="table table-striped table-bordered mt-3">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Carrera</th>
              <th>Semestre</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla"></tbody>
        </table>

        <!-- Sección de búsqueda -->
        <div class="mt-4">
          <input id="buscarInput" type="text" class="form-control mb-2" placeholder="Buscar por nombre, carrera o semestre">
          <button id="btnBuscar" class="btn btn-info">Buscar</button>
          <button id="btnLimpiarBusqueda" class="btn btn-warning">Limpiar búsqueda</button>
        </div>

        <!-- Filtro por carrera -->
        <div class="mt-3">
          <select id="filtroCarrera" class="form-select">
            <option value="Todas">Todas</option>
            <option value="Tecnologías de la Información">Tecnologías de la Información</option>
            <option value="Software">Software</option>
            <option value="Sistemas">Sistemas</option>
          </select>
          <button id="btnFiltrar" class="btn btn-dark mt-2">Filtrar</button>
        </div>

        <!-- Botón para ver JSON general -->
        <div class="mt-3">
          <button id="btnJSONGeneral" class="btn btn-success">Ver JSON General</button>
        </div>

        <!-- Modal Bootstrap -->
        <div class="modal fade" id="jsonModal" tabindex="-1">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header"><h5 class="modal-title">Información JSON</h5></div>
              <div class="modal-body"><pre id="modalBody"></pre></div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Librería SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="app.js"></script>
</body>
</html>
